[theme]
# צבעי בנייה - אדמה / כתום
primaryColor             = "#D97706"
backgroundColor          = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor                = "#0F172A"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
